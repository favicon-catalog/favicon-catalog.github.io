<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favicon Catalog</title>
    <link rel="icon" href="%BASE_URL%logo.svg" type="image/svg+xml">
    <script>
      const savedTheme = window.localStorage.getItem("favicon-catalog-theme");
      const preferredTheme = savedTheme || "light";
      document.documentElement.dataset.theme = preferredTheme;
    </script>
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <header class="site-bar site-header">
      <div class="shell navbar">
        <a class="nav-brand" href="./">
          <img class="brand-mark" src="%BASE_URL%logo.svg" alt="" aria-hidden="true">
          <span class="brand-copy">
            <strong>Favicon Catalog</strong>
            <span class="brand-tag" id="tag">Loading...</span>
          </span>
        </a>
        <div class="nav-actions">
          <button class="btn pill icon-link" id="theme-toggle" type="button" aria-label="Switch to dark mode" title="Switch to dark mode">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="theme-toggle-path"></path>
            </svg>
          </button>
          <button class="btn pill icon-link menu-trigger" id="index-menu-button" type="button" aria-expanded="false" aria-label="Open index dialog" title="Open index dialog">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="index-icon-path"></path>
            </svg>
          </button>
          <a class="pill icon-link" href="https://github.com/favicon-catalog/favicons" target="_blank" rel="noreferrer noopener" aria-label="GitHub repository" title="GitHub repository">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="github-icon-path"></path>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="controls">
        <label class="search">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path id="search-icon-path"></path>
          </svg>
          <input id="search" type="search" placeholder="Search favicons..." disabled>
        </label>
        <div class="controls-side">
          <div class="summary" id="summary">Loading snapshot...</div>
          <div class="view-switch" role="group" aria-label="View mode">
            <button class="btn pill icon-link view-toggle" id="tile-view-button" type="button" aria-label="Tile view" title="Tile view">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path id="tile-view-icon-path"></path>
              </svg>
            </button>
            <button class="btn pill icon-link view-toggle" id="content-view-button" type="button" aria-label="Content view" title="Content view">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path id="content-view-icon-path"></path>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section class="table-shell">
        <div class="tile-view" id="tile-view"></div>
        <div class="table-wrap" id="content-view" hidden>
          <table>
            <thead>
              <tr>
                <th>Domain</th>
                <th>Site Icons</th>
                <th>Gstatic Icons</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div class="detail-view" id="detail-view" hidden>
          <div class="detail-header">
            <button class="btn detail-back" id="detail-back-button" type="button" aria-label="Back to list" title="Back to list">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path id="back-icon-path"></path>
              </svg>
            </button>
            <h1 class="detail-title" id="detail-title"></h1>
          </div>
          <div class="detail-content" id="detail-content"></div>
        </div>
        <div class="empty" id="empty" hidden>No matching domains.</div>
        <div class="table-footer">
          <div class="summary" id="page-summary"></div>
          <div class="pager" id="pager"></div>
        </div>
      </section>

    </main>

    <dialog class="index-dialog" id="index-dialog" aria-labelledby="index-dialog-title">
      <div class="index-head">
        <div>
          <p class="index-kicker">Index</p>
          <h2 class="index-title" id="index-dialog-title">JSON</h2>
        </div>
        <div class="dialog-actions">
          <button class="btn icon-link manifest-action manifest-copy" id="index-copy" type="button" aria-label="Copy index JSON" title="Copy index JSON">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="index-copy-icon-path"></path>
            </svg>
          </button>
          <a class="btn icon-link manifest-action" id="index-download" href="#" download="index.json" aria-label="Download index JSON" title="Download index JSON">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="index-download-icon-path"></path>
            </svg>
          </a>
          <button class="btn index-close icon-link" id="index-close" type="button" aria-label="Close dialog" title="Close dialog">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="close-icon-path"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="index-content" id="index-content"></div>
    </dialog>

    <dialog class="index-dialog" id="manifest-dialog" aria-labelledby="manifest-dialog-title">
      <div class="index-head">
        <div>
          <p class="index-kicker">Manifest</p>
          <h2 class="index-title" id="manifest-dialog-title">JSON</h2>
        </div>
        <div class="dialog-actions">
          <button class="btn icon-link manifest-action manifest-copy" id="manifest-copy" type="button" aria-label="Copy manifest JSON" title="Copy manifest JSON">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="manifest-copy-icon-path"></path>
            </svg>
          </button>
          <a class="btn icon-link manifest-action" id="manifest-download" href="#" download aria-label="Download manifest JSON" title="Download manifest JSON">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="manifest-download-icon-path"></path>
            </svg>
          </a>
          <button class="btn index-close icon-link" id="manifest-close" type="button" aria-label="Close manifest dialog" title="Close manifest dialog">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path id="manifest-close-icon-path"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="index-content" id="manifest-content"></div>
    </dialog>

    <footer class="site-bar site-footer-bar">
      <div class="shell site-footer">
        <div class="footer-copy">
          <img class="brand-mark" src="%BASE_URL%logo.svg" alt="" aria-hidden="true">
          <div class="footer-text">
            <p class="footer-title">Favicon Catalog <span class="brand-tag" id="footer-tag">Loading...</span></p>
            <p class="footer-note" id="exported-at">Loading...</p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
